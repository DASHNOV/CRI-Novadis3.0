services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-cri_novadis}
      POSTGRES_USER: ${DB_USER:-cri_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-cri_user} -d ${DB_NAME:-cri_novadis}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    image: cri-novadis-api:latest
    ports:
      - "127.0.0.1:5200:5200"
    environment:
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=${DB_NAME:-cri_novadis};Username=${DB_USER:-cri_user};Password=${DB_PASSWORD}
      - Jwt__SecretKey=${JWT_SECRET}
      - Email__TenantId=${EMAIL_TENANT_ID}
      - Email__ClientId=${EMAIL_CLIENT_ID}
      - Email__ClientSecret=${EMAIL_CLIENT_SECRET}
      - Email__FromAddress=${EMAIL_FROM}
      - Email__FromName=${EMAIL_FROM_NAME:-Novadis CRI}
      - ASPNETCORE_ENVIRONMENT=Production
    depends_on:
      db:
        condition: service_healthy
    restart: always
    volumes:
      - ./logs:/app/logs
      - ./uploads:/app/uploads

volumes:
  postgres_data:
