dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  
  # Navigation
  go_router: ^13.0.0
  
  # Hooks for state management
  flutter_hooks: ^0.20.0
  
