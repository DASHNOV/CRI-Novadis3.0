name: Deploy API to Production

on:
  workflow_dispatch:
  push:
    branches:
      - dev
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-api.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0.x'

      - name: Build and Publish API
        run: |
          cd backend/src/NovadisApi
          dotnet build -c Release
          dotnet publish -c Release -o publish

      - name: Copy publish files to server
        uses: appleboy/scp-action@master
        with:
          host: 192.168.200.205
          username: Administrateur
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "backend/src/NovadisApi/publish/"
          target: "C:\\temp\\novadis-api-publish"

      - name: Deploy to production
        uses: appleboy/ssh-action@master
        with:
          host: 192.168.200.205
          username: Administrateur
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            $ErrorActionPreference = 'Stop'
            Write-Host "Stopping NovadisApi service..."
            Stop-Service -Name NovadisApi -Force

            Write-Host "Clearing old files..."
            $deployPath = 'C:\novadis-api'
            Get-ChildItem -Path $deployPath -Exclude '.env' -Force | Remove-Item -Recurse -Force

            Write-Host "Copying new files..."
            $tempPath = 'C:\temp\novadis-api-publish'
            Copy-Item -Path "$tempPath\*" -Destination $deployPath -Recurse -Force

            Write-Host "Cleaning up temporary files..."
            Remove-Item -Path $tempPath -Recurse -Force

            Write-Host "Starting NovadisApi service..."
            Start-Service -Name NovadisApi

            Write-Host "Deployment completed successfully!"
