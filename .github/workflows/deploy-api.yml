name: Deploy API to Production

on:
  workflow_dispatch:
  push:
    branches:
      - dev
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-api.yml'

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v3

      - name: Build and Publish API
        run: |
          cd backend/src/NovadisApi
          dotnet publish -c Release -o publish

      - name: Deploy to production
        run: |
          $ErrorActionPreference = 'Stop'
          $publishPath = "backend\src\NovadisApi\publish"
          $deployPath = "C:\novadis-api"

          Write-Host "Stopping NovadisApi service..."
          Stop-Service -Name NovadisApi -Force

          Write-Host "Clearing old files..."
          Get-ChildItem -Path $deployPath -Exclude '.env' -Force | Remove-Item -Recurse -Force

          Write-Host "Copying new files..."
          Copy-Item -Path "$publishPath\*" -Destination $deployPath -Recurse -Force

          Write-Host "Starting NovadisApi service..."
          Start-Service -Name NovadisApi

          Write-Host "Deployment completed successfully!"

      - name: Smoke test
        run: |
          Start-Sleep -Seconds 5
          $response = Invoke-WebRequest -Uri "http://localhost:5200/api/health/live" -UseBasicParsing
          if ($response.StatusCode -ne 200) {
            Write-Error "Smoke test failed: API not responding (status $($response.StatusCode))"
            exit 1
          }
          Write-Host "Smoke test passed: API is alive"
